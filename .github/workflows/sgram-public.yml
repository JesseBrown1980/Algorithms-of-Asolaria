# SGRAM — Streaming GitRAM, run PUBLICLY on this public repo, for free.
#
# What it does, honestly:
#   Shards a public corpus (enwik8, sha256-verified from its canonical source)
#   across N free GitHub-hosted cells. Each cell is STATELESS: it downloads the
#   corpus, cuts ONE deterministic contiguous shard, compresses it with the
#   dependency-free in-repo Rust codec (vc65), and PROVES its own PASS by a
#   byte-exact SHA restore (restore=OK) — or the run is invalid. The fan-in job
#   requires ALL N receipts, re-checks every shard restored losslessly, sums the
#   byte-exact payloads plus the decoder source, and seals ONE bpc for the whole
#   corpus into the public job summary + an artifact anyone can download.
#
# The honest boundary (this is a benchmark, not a miracle):
#   * This measures REAL lossless compression. It is bounded by Shannon entropy
#     and never goes below it. The sealed number is ~1.75 bpc on enwik8 — ABOVE
#     the Hutter Prize record (~0.91 bpc). It does not beat Hutter and does not
#     claim to. It is a reproducible, public, receipt-backed measurement.
#   * Independent shards cold-start the model per shard, so the SHARDED total is
#     slightly LARGER than one monolithic run (+~6% at 8 shards / 10 MB, measured).
#     The seal reports the true sharded total. The measurement is the referee.
#   * The rime/addressing layer (the spheres, the discrete-log Fischer) is a
#     separate ~0-bpc axis over GENERATED structure. It is NOT what this workflow
#     measures. This workflow measures only the honest compression axis.
#
# Free + unlimited on public repos. Trigger it from the Actions tab
# (Run workflow), or via the API. Every log line is public and reproducible.

name: SGRAM public seal

on:
  workflow_dispatch:
    inputs:
      shards:
        description: 'Number of stateless cells (shards)'
        required: true
        default: '10'
      k:
        description: 'Model order k'
        required: true
        default: '10'
      bytes:
        description: 'Corpus bytes to seal (0 = full 100 MB enwik8; 10000000 = fast ~1-min demo)'
        required: true
        default: '10000000'

permissions:
  contents: read

concurrency:
  group: sgram-public-${{ github.ref }}
  cancel-in-progress: false          # never kill a seal in flight

env:
  ENWIK8_URL: https://mattmahoney.net/dc/enwik8.zip
  ENWIK8_SHA256: 2b49720ec4d78c3c9fabaee6e4179a5e997302b3a70029f30f2d582218c024a8
  CORPUS_FULL: '100000000'

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
      corpus_bytes: ${{ steps.mk.outputs.corpus_bytes }}
    steps:
      - id: mk
        run: |
          set -euo pipefail
          N='${{ github.event.inputs.shards }}'
          B='${{ github.event.inputs.bytes }}'
          [ "$B" = "0" ] && B="${CORPUS_FULL}"
          [ "$B" -gt "${CORPUS_FULL}" ] && B="${CORPUS_FULL}"
          echo "corpus_bytes=$B" >> "$GITHUB_OUTPUT"
          echo "matrix={\"cell\":[$(seq -s, 0 $((N-1)))]}" >> "$GITHUB_OUTPUT"
          echo "Planned: $N stateless cells over $B bytes of enwik8 (order-${{ github.event.inputs.k }})"

  cell:
    needs: plan
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Compile the dependency-free codec from in-repo source
        run: rustc --edition=2021 -O tools/honest-compressor/rust/variants/vc65.rs -o vc65

      - name: Fetch enwik8 from its canonical public source and verify sha256
        run: |
          set -euo pipefail
          curl -fsSL "$ENWIK8_URL" -o enwik8.zip
          unzip -o -q enwik8.zip
          echo "${ENWIK8_SHA256}  enwik8" | sha256sum -c -
          echo "enwik8 verified: $(stat -c%s enwik8) bytes"

      - name: Cut this cell's shard deterministically (contiguous, no overlap)
        run: |
          set -euo pipefail
          N='${{ github.event.inputs.shards }}'; C='${{ matrix.cell }}'
          CB='${{ needs.plan.outputs.corpus_bytes }}'
          CHUNK=$(( (CB + N - 1) / N ))
          OFF=$(( C * CHUNK ))
          LEN=$CHUNK
          [ $((OFF + LEN)) -gt $CB ] && LEN=$(( CB - OFF ))
          if [ "$LEN" -le 0 ]; then echo "empty shard (N>bytes) — skipping"; touch shard.bin; else
            dd if=enwik8 of=shard.bin bs=1M iflag=skip_bytes,count_bytes skip=$OFF count=$LEN status=none
          fi
          echo "cell $C: shard bytes=$(stat -c%s shard.bin)  offset=$OFF"

      - name: Compress + self-verify (PASS requires restore=OK)
        run: |
          set -euo pipefail
          RES=$(./vc65 shard.bin '${{ github.event.inputs.k }}')
          echo "$RES" | tee "receipt-${{ matrix.cell }}.txt"
          echo "$RES" | grep -q 'restore=OK' || { echo "SGRAM_SHARD_FAIL: restore not OK"; exit 1; }
          echo "SGRAM_SHARD_PASS cell=${{ matrix.cell }} shard_sha=$(sha256sum shard.bin | cut -d' ' -f1)"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sgram-receipt-${{ matrix.cell }}
          path: receipt-${{ matrix.cell }}.txt
          if-no-files-found: error
          retention-days: 90

  fanin:
    needs: [plan, cell]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { pattern: sgram-receipt-*, merge-multiple: true, path: receipts }

      - name: Require ALL N shards, verify PASS, sum byte-exact totals, seal one bpc
        run: |
          set -euo pipefail
          N='${{ github.event.inputs.shards }}'
          CNT=$(ls receipts/receipt-*.txt 2>/dev/null | wc -l)
          [ "$CNT" -eq "$N" ] || { echo "fan-in requires $N receipts, got $CNT — HELD (a shard failed)"; exit 1; }
          PAY=0; CORPUS_N=0
          for f in receipts/receipt-*.txt; do
            grep -q 'restore=OK' "$f" || { echo "shard not lossless: $f — HELD"; exit 1; }
            p=$(grep -o 'payload=[0-9]*' "$f" | head -1 | cut -d= -f2)
            n=$(grep -o ' N=[0-9]*' "$f" | head -1 | cut -d= -f2)
            PAY=$((PAY + p)); CORPUS_N=$((CORPUS_N + n))
          done
          DEC=$(stat -c%s tools/honest-compressor/rust/variants/vc65.rs)
          TOTAL=$((PAY + DEC))
          BPC=$(python3 -c "print(f'{$TOTAL*8/$CORPUS_N:.4f}')")
          {
            echo "## SGRAM public seal"
            echo ""
            echo "| field | value |"
            echo "|---|---|"
            echo "| shards (stateless cells) | $N |"
            echo "| corpus bytes (enwik8) | $CORPUS_N |"
            echo "| payload sum (bytes) | $PAY |"
            echo "| decoder source (bytes, charged) | $DEC |"
            echo "| total sealed (bytes) | $TOTAL |"
            echo "| **sealed bpc_total** | **$BPC** |"
            echo "| all shards restore=OK | true (fan-in would have HELD otherwise) |"
            echo ""
            echo "Honest note: sharded total; +~6% cold-start overhead per shard is REAL and included."
            echo "This is ABOVE the Hutter record (~0.91 bpc) and above Shannon — a reproducible"
            echo "public benchmark, not a below-entropy claim. Codec: in-repo vc65.rs, integer-deterministic."
          } | tee "$GITHUB_STEP_SUMMARY" | tee SGRAM-PUBLIC-SEAL.md

      - uses: actions/upload-artifact@v4
        with:
          name: SGRAM-PUBLIC-SEAL
          path: SGRAM-PUBLIC-SEAL.md
          retention-days: 90
